<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Semântica</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        thead {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <table>
        <thead>
            <tr>
                <th>Nome</trth>
                <th>Detalhes</th>
            </tr>
            <tr>
                <td rowspan="2">Diego</td>
                <td>Ocupação: Desenvolvedor</td>
            </tr>
            <td>Tel: 1 979751090</td>
            <tr>
                <td>Bruno</td>
                <td>Tel: 11 25215510, ocupação : designer</td>
            </tr>
        </thead>
        
    </table>

</body>
</html>
