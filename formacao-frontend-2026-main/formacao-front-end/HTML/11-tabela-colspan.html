<html lang="pt-BR">
 
<head><!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Semântica</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        thead {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cargo</th>
              
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>João</td>
                <td>Analista</td>
                <td>R$ 3.000</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>Gerente</td>
                <td>R$ 6.000</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
