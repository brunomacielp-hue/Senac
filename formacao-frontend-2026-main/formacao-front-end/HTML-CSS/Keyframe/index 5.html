<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>

    <style>
          .pulse-animation{
            width: 53px;
            height: 53px;
           border: 100px;
           margin: 50px;
           border: 40px;
           animation: pulse 2s infinite;
           animation: none;
          }

          @keyframes pulse {
            10% {
             box-shadow: 0 0 0 0 rgba 204, 169, 44, 0.40;
            }
            70% {
              box-shadow: 0 0 0 30px rgba 204, 169, 44, 0;
            }
            100% {
             box-shadow: 0 0 0 0 rgba 204, 169, 44, 00.5;
            }
     }    
    </style>
</head> 

<body>

</html>
