<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>
    <style>
          div{
            width: 100px;
            height: 100px;
            background-color: rgba(231, 9, 161, 0.814);
            position: relative;
            animation: animacao 5s infinite;
          }

          @keyframes animacao {

            from {
                top: 0px;
                left: 0px;
            }

            to {
                top: 200px;
                top: 200px;
                left: 200px;
            }
          }
    </style>
</head> 
<body>
    <div>

    </div>
</body>
</html>
