<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>
    <style>
          h1{
            width: 100px;
            height: 100px;
            background-color: rgba(231, 9, 161, 0.814);
            position: relative;
            animation: animacao 5s infinite;
          }

          @keyframes animacao {

            100%{
               color: blue;
               /*transform: rotate(360deg);*/
               transform: rotatex(50deg);
            }

            50%{
              color: pink;
              transform: rotatey(150deg);
               
            }

            100%{
              color: red;
              transform: rotate(360deg);
          }
 }

          
    </style>
</head> 
<body>
  <h1>Bruno</h1>
</body>
</html>
